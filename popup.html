<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Quick Copy Notes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Tambah Catatan</h2>
    <input type="text" id="input-judul" placeholder="Masukkan Judul (misal: Alamat)">
    <textarea id="input-isi" placeholder="Masukkan isi teks yang akan disalin..."></textarea>
    <button id="btn-simpan">Simpan</button>

    <hr>

    <h2>Daftar Catatan</h2>
    <p class="subtitle">Klik judul untuk menyalin teks</p>
    <ul id="daftar-catatan">
      <!-- Daftar akan dimunculkan di sini oleh JavaScript -->
    </ul>
  </div>

  <script src="popup.js"></script>
</body>
</html>
